<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字母站刷波工具网页版</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #F19483 0%, #EE3F4D 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-color: #333;
            --secondary-text: #666;
            --border-radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
        }
        .container {
            background: var(--glass-bg);
            width: 100%;
            max-width: 480px;
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(238, 63, 77, 0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 { font-size: 22px; text-align: center; color: #EE3F4D; margin-bottom: 5px; font-weight: 800; cursor: pointer; user-select: none; }
        .card { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 12px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--secondary-text); font-size: 13px; }
        select, textarea, input[type="password"] { width: 100%; padding: 10px; border: 2px solid #F19483; border-radius: 8px; font-size: 14px; background: #fff; outline: none; transition: all 0.3s; font-family: inherit; }
        textarea { height: 100px; resize: none; font-family: monospace; }
        select:focus, textarea:focus, input:focus { border-color: #EE3F4D; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 50px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s, opacity 0.3s; background: var(--primary-gradient); box-shadow: 0 4px 15px rgba(238, 63, 77, 0.4); }
        .btn:active { transform: scale(0.98); }
        .btn.stop { background: #666; box-shadow: none; }
        .status-bar { display: flex; justify-content: space-between; font-size: 13px; color: var(--secondary-text); margin-top: 4px; }
        .status-value { font-weight: bold; color: #EE3F4D; }
        #log-window { height: 200px; background: #1e1e1e; color: #ffffff; border-radius: 8px; padding: 10px; font-family: "Menlo", "Monaco", "Courier New", monospace; font-size: 11px; overflow-y: auto; line-height: 1.4; }
        .log-entry { margin-bottom: 3px; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .log-time { color: #888; margin-right: 5px; }
        .log-warn { color: #ffeb3b; }
        .log-error { color: #ff5252; }
        .log-success { color: #69f0ae; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div>
        <h1 id="app-title">🥕字母站刷波工具网页版🥕</h1>
        <p style="text-align: center; color: #888; font-size: 12px;" id="mode-tag">SUperView_mini</p>
    </div>

    <!-- 调试模式UI -->
    <div id="manual-ui" class="card hidden">
        <label for="debug-pwd">调试密码</label>
        <input type="password" id="debug-pwd" placeholder="输入密码以解锁" style="margin-bottom: 10px;">
        
        <label for="bv-input">手动输入BV号 (每行一个)</label>
        <textarea id="bv-input" placeholder="BV1xx...&#10;BV2xx..."></textarea>
    </div>

    <!-- 按钮仅在调试模式或需要手动干预时显示 -->
    <button id="action-btn" class="btn hidden">开始运行</button>

    <div class="card">
        <div class="status-bar">
            <span>待刷视频: <span id="video-count" class="status-value">0</span></span>
            <span>下次循环: <span id="next-run" class="status-value">--:--</span></span>
        </div>
        <div class="status-bar">
            <span>累计播放: <span id="success-count" class="status-value">0</span></span>
            <span>当前状态: <span id="status-text">初始化...</span></span>
        </div>
    </div>

    <div id="log-window"></div>
</div>

<script>
    const CONFIG = {
        intervalMinutes: 5.5,
        targetFavId: '3682220021', // 硬编码收藏夹id
        debugPwd: 'SUperView'
    };

    // === 代理池配置 ===
    const PROXY_LIST = [
        { name: '线路1', url: (target) => `https://api.codetabs.com/v1/proxy?quest=${target}` },
        { name: '线路2', url: (target) => `https://corsproxy.io/?${target}` },
        { name: '线路3', url: (target) => `https://api.allorigins.win/raw?url=${target}` }
    ];

    let state = {
        isRunning: false,
        isDebug: false,
        videos: [],
        countdownId: null,
        totalSent: 0
    };

    const el = {
        title: document.getElementById('app-title'),
        btn: document.getElementById('action-btn'),
        manualUi: document.getElementById('manual-ui'),
        bvInput: document.getElementById('bv-input'),
        pwdInput: document.getElementById('debug-pwd'),
        log: document.getElementById('log-window'),
        count: document.getElementById('video-count'),
        nextRun: document.getElementById('next-run'),
        success: document.getElementById('success-count'),
        status: document.getElementById('status-text'),
        modeTag: document.getElementById('mode-tag')
    };

    // === 触发器逻辑 ===
    let titleClickCount = 0;
    let titleClickTimer = null;

    el.title.addEventListener('click', () => {
        titleClickCount++;
        clearTimeout(titleClickTimer);
        titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 800);

        if (titleClickCount >= 5) {
            enterDebugMode();
            titleClickCount = 0;
        }
    });

    function enterDebugMode() {
        if (state.isDebug) return;
        stop(); // 停止当前自动任务
        state.isDebug = true;
        
        el.modeTag.innerText = "🛠️ 调试模式 (已暂停)";
        el.manualUi.classList.remove('hidden');
        el.btn.classList.remove('hidden');
        el.btn.innerText = "验证并运行";
        el.btn.classList.remove('stop');
        
        log(">>> 进入调试模式，自动任务已挂起", "warn");
        log("请输入BV号和密码以继续", "info");
    }

    function log(msg, type = 'info') {
        const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        let colorClass = '';
        if (type === 'warn') colorClass = 'log-warn';
        if (type === 'error') colorClass = 'log-error';
        if (type === 'success') colorClass = 'log-success';
        
        entry.innerHTML = `<span class="log-time">[${time}]</span><span class="${colorClass}">${msg}</span>`;
        el.log.appendChild(entry);
        el.log.scrollTop = el.log.scrollHeight;
    }

    async function smartFetch(targetUrl) {
        const encodedUrl = encodeURIComponent(targetUrl);
        for (let proxy of PROXY_LIST) {
            if (!state.isRunning) break;
            const finalUrl = proxy.url(encodedUrl);
            try {
                const resp = await fetch(finalUrl);
                const data = await resp.json();
                return data;
            } catch (e) {
                // 静默失败，切换代理
            }
        }
        throw new Error("所有代理线路均无法连接B站接口");
    }

    async function fetchFavVideos(mediaId) {
        log(`正在解析默认收藏夹...`);
        try {
            const url = `https://api.bilibili.com/x/v3/fav/resource/list?media_id=${mediaId}&pn=1&ps=20&order=mtime&type=0&platform=web`;
            const data = await smartFetch(url);
            const list = data.data ? data.data.medias : [];
            state.videos = list.map(v => ({ bvid: v.bv_id, title: v.title }));
        } catch (e) {
            log(`解析收藏夹失败: ${e.message}`, "error");
        }
    }

    function parseManualVideos() {
        const text = el.bvInput.value.trim();
        if (!text) return;
        const bvs = text.split(/\n+/);
        state.videos = bvs.map(bv => ({ bvid: bv.trim(), title: bv.trim() }));
    }

    async function enrichVideoData() {
        log(`正在解析视频信息 (${state.videos.length}个)...`);
        let count = 0;
        for (let v of state.videos) {
            if (!state.isRunning) break;
            try {
                const url = `https://api.bilibili.com/x/web-interface/view?bvid=${v.bvid}`;
                const res = await smartFetch(url);
                if (res.code === 0) {
                    const d = res.data;
                    v.aid = d.aid;
                    v.cid = d.cid;
                    v.title = d.title;
                    v.mid = d.owner ? d.owner.mid : 0;
                    
                    if (d.desc_v2 && d.desc_v2.length > 0) {
                        v.type = d.desc_v2[0].type;
                    } else {
                        v.type = 1;
                    }
                    count++;
                }
            } catch (e) {
                log(`${v.bvid} 解析失败`, 'warn');
            }
            await new Promise(r => setTimeout(r, 800));
        }
        el.count.innerText = count;
    }

    async function runBoostCycle() {
        if (!state.isRunning) return;
        log(`>>> 开始发送播放请求...`, 'success');
        el.status.innerText = "正在请求";

        for (let v of state.videos) {
            if (!state.isRunning) break;
            if (!v.aid || !v.cid) continue;

            try {
                const postData = new URLSearchParams({
                    'aid': v.aid,
                    'cid': v.cid,
                    'bvid': v.bvid,
                    'part': '1',
                    'mid': v.mid,
                    'jsonp': 'jsonp',
                    'type': v.type,
                    'sub_type': '0'
                });

                await fetch('https://api.bilibili.com/x/click-interface/click/web/h5', {
                    method: 'POST', 
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: postData
                });

                state.totalSent++;
                el.success.innerText = state.totalSent;
                log(`[√] 已播放: ${v.title.substring(0, 20)}...`);
            } catch (e) {
                log(`请求异常: ${v.bvid}`, "error");
            }
        }

        if (state.isRunning) {
            log(`本轮完成，休眠 ${CONFIG.intervalMinutes} 分钟`);
            startCountdown(CONFIG.intervalMinutes * 60);
        }
    }

    function startCountdown(seconds) {
        el.status.innerText = "休眠中";
        let remaining = seconds;
        clearInterval(state.countdownId);
        state.countdownId = setInterval(() => {
            if (remaining <= 0) {
                clearInterval(state.countdownId);
                runBoostCycle();
                return;
            }
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            el.nextRun.innerText = `${m}:${s}`;
            remaining--;
        }, 1000);
    }

    async function executeTask() {
        state.isRunning = true;
        
        if (state.isDebug) {
            el.btn.innerText = "停止运行";
            el.btn.classList.add('stop');
            el.bvInput.disabled = true;
            el.pwdInput.disabled = true;
            parseManualVideos();
        } else {
            await fetchFavVideos(CONFIG.targetFavId);
        }

        if (state.videos.length > 0) {
            await enrichVideoData();
            if (state.videos.filter(v => v.cid).length > 0) {
                runBoostCycle();
            } else {
                log("无有效视频，请检查网络", "error");
                stop();
            }
        } else {
            log("未发现视频", "error");
            stop();
        }
    }

    function stop() {
        state.isRunning = false;
        clearInterval(state.countdownId);
        el.status.innerText = "已停止";
        
        if (state.isDebug) {
            el.btn.innerText = "验证并运行";
            el.btn.classList.remove('stop');
            el.bvInput.disabled = false;
            el.pwdInput.disabled = false;
        }
        
        log("任务已停止", "warn");
    }

    el.btn.addEventListener('click', () => {
        if (!state.isDebug) return; // 非调试模式下按钮不应起作用

        if (state.isRunning) {
            stop();
        } else {
            // 验证密码
            if (el.pwdInput.value === CONFIG.debugPwd) {
                executeTask();
            } else {
                log("❌ 密码错误，拒绝执行", "error");
            }
        }
    });

    // === 自动启动入口 ===
    window.addEventListener('load', () => {
        log("自动任务启动中...");
        executeTask();
    });

</script>
</body>
</html>
